<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>PhishGuard AI</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>PhishGuard AI</h2>
            <p>Threat Detection</p>
        </div>

        <div class="content" id="content">
            <div class="url-box" id="current-url">Loading URL...</div>

            <button id="scan-btn" class="scan-btn">Scan Current Page</button>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>

            <div id="result-container" class="hidden">
                <div id="risk-badge" class="risk-badge">SAFE</div>
                <p>Score: <span id="risk-score">0</span>/100</p>
                
                <div class="reasons">
                    <h4>Why flagged?</h4>
                    <ul id="reasons-list"></ul>
                </div>
            </div>
            
            <div id="error-container" class="error-container hidden">
                <p id="error-text"></p>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
